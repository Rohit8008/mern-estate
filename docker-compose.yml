services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Cloudinary — uploads are done client-side directly to Cloudinary,
        # so these must be baked into the frontend bundle at build time.
        VITE_CLOUDINARY_CLOUD_NAME: ${VITE_CLOUDINARY_CLOUD_NAME}
        VITE_CLOUDINARY_UPLOAD_PRESET: ${VITE_CLOUDINARY_UPLOAD_PRESET}
    env_file:
      - backend/.env          # MONGO_URI, JWT_SECRET, REFRESH_SECRET, etc.
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      # Frontend is served by the same Express process, so same origin
      FRONTEND_URL: http://localhost:3000
      # If OpenObserve runs on your host machine, use host.docker.internal on Mac/Windows.
      # On Linux set OPENOBSERVE_URL in .env or use the commented-out OO service below.
      OPENOBSERVE_URL: ${OPENOBSERVE_URL:-http://host.docker.internal:5080}
    ports:
      - "3000:3000"
    volumes:
      # Persist user-uploaded files across container restarts
      - uploads_data:/app/uploads
    restart: unless-stopped

  # ── Optional: run OpenObserve alongside the app ──────────────────────────
  # Uncomment this block if you want OO managed by compose instead of
  # running it separately. Also change OPENOBSERVE_URL above to:
  #   http://openobserve:5080
  #
  # openobserve:
  #   image: public.ecr.aws/zinclabs/openobserve:latest
  #   environment:
  #     ZO_ROOT_USER_EMAIL: admin@example.com
  #     ZO_ROOT_USER_PASSWORD: Password@123
  #     ZO_DATA_DIR: /data
  #   ports:
  #     - "5080:5080"
  #   volumes:
  #     - openobserve_data:/data
  #   restart: unless-stopped

volumes:
  uploads_data:
  # openobserve_data:
